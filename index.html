// Prozentanteile festschreiben (unveränderlich)
GROUPS.forEach(g => {
  g.products.forEach(p => { p.pct = p.amount / total; });
  g.pct = g.products.reduce((a,p)=>a+p.pct,0);
});

// Gespeicherten Wert laden (pro Gerät individuell)
let currentTotal = parseFloat(localStorage.getItem(STORAGE_KEY)) || DEFAULT_TOTAL;

function saveTotal(val) {
  localStorage.setItem(STORAGE_KEY, val);
}

function getAmt(pct){ return Math.round(pct * currentTotal * 100) / 100; }
function fmtAmt(pct){ const v=getAmt(pct); return Number.isInteger(v)?v:v.toFixed(2); }

function updateHeader(){
  const hdrEl = document.getElementById('hdrTotal');
  hdrEl.textContent = currentTotal + ' €';
  hdrEl.onclick = editTotal;
  hdrEl.style.cursor = 'pointer';
  document.getElementById('hdrSub').textContent = (currentTotal*12) + ' € / Jahr · ' + posCount + ' Positionen';
}
updateHeader();

// ── PIE CHART (SVG) ──────────────────────────────────────────
const svg = document.getElementById('piesvg');
const cx=130, cy=130, r=110, ri=72, gap=0.03;
const pieData = GROUPS.map(g=>({
  name:g.name, color:g.color, emoji:g.emoji,
  value:g.products.reduce((a,p)=>a+p.amount,0),
  pct: g.pct
}));

function polarToXY(cx,cy,r,angle){
  return [cx+r*Math.cos(angle), cy+r*Math.sin(angle)];
}
function describeArc(cx,cy,r,ri,startA,endA){
  const [x1,y1]=polarToXY(cx,cy,r,startA);
  const [x2,y2]=polarToXY(cx,cy,r,endA);
  const [x3,y3]=polarToXY(cx,cy,ri,endA);
  const [x4,y4]=polarToXY(cx,cy,ri,startA);
  const large=endA-startA>Math.PI?1:0;
  return `M${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} L${x3},${y3} A${ri},${ri},0,${large},0,${x4},${y4} Z`;
}

let startAngle = -Math.PI/2;
const paths = [];
pieData.forEach((d,i)=>{
  const slice = (d.value/total)*2*Math.PI - gap;
  const endAngle = startAngle + slice;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', describeArc(cx,cy,r,ri,startAngle,endAngle));
  path.setAttribute('fill', d.color);
  path.setAttribute('stroke','none');
  path.style.cursor='pointer';
  path.style.transition='opacity 0.15s';
  path.dataset.index=i;

  path.addEventListener('click',()=>openModal(i));
  path.addEventListener('mouseenter',()=>{ highlightSlice(i); showPieCenter(i); });
  path.addEventListener('mouseleave',()=>{ resetSlices(); resetPieCenter(); });
  path.addEventListener('touchstart',(e)=>{ e.preventDefault(); highlightSlice(i); showPieCenter(i); },{passive:false});
  path.addEventListener('touchend',(e)=>{ e.preventDefault(); resetSlices(); resetPieCenter(); openModal(i); },{passive:false});

  svg.appendChild(path);
  paths.push(path);
  startAngle = endAngle + gap;
});

function highlightSlice(activeI){
  paths.forEach((p,i)=>{ p.style.opacity = (i===activeI)?'1':'0.3'; });
}
function resetSlices(){ paths.forEach(p=>{ p.style.opacity='1'; }); }

const pieCenter = document.getElementById('pieCenter');
function showPieCenter(i){
  const d = pieData[i];
  const val = getAmt(d.pct);
  pieCenter.onclick = null;
  pieCenter.innerHTML = `
    <div class="pie-center-emoji">${d.emoji}</div>
    <div class="pie-center-name" style="color:${d.color};white-space:nowrap">${d.name}</div>
    <div class="pie-center-val" style="white-space:nowrap">${val} €/Mo</div>
    <div class="pie-center-pct" style="white-space:nowrap">${(d.pct*100).toFixed(1)}%</div>`;
}
function resetPieCenter(){
  pieCenter.onclick = editTotal;
  pieCenter.innerHTML = `
    <div style="font-size:11px;color:var(--muted);white-space:nowrap">Gesamt</div>
    <div style="font-size:22px;font-weight:900;white-space:nowrap">${currentTotal} €</div>
    <div style="font-size:10px;color:var(--dim);white-space:nowrap">/ Monat</div>
    <div style="font-size:9px;color:#4b5563;white-space:nowrap;margin-top:2px">antippen zum Ändern</div>`;
}

function editTotal(){
  pieCenter.onclick = null;
  pieCenter.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Betrag eingeben</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:3px">
      <input id="totalInput" class="pie-center-edit" type="number" value="${currentTotal}" min="1" inputmode="numeric"/>
      <span style="font-size:16px;font-weight:700">€</span>
    </div>
    <div style="font-size:10px;color:var(--dim);margin-top:4px">Enter oder außen tippen</div>`;
  const inp = document.getElementById('totalInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); applyTotal(inp); }});
  inp.addEventListener('blur', ()=>{ setTimeout(()=>applyTotal(inp),100); });

function applyTotal(inp){
  const val = parseFloat(inp.value);
  if(!isNaN(val) && val > 0){
    currentTotal = Math.round(val*100)/100;
    saveTotal(currentTotal); // ← im localStorage sichern
  }
  updateAll();
}

function updateAll(){

  resetPieCenter();
  renderCards();
  if(document.getElementById('overlay').classList.contains('open') && window._openModalIndex !== undefined){
    openModal(window._openModalIndex);

// ── TRADE REPUBLIC DEEPLINK ───────────────────────────────────
function openTR(isin) {
  const ua = navigator.userAgent;
  const isAndroid = /Android/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const playStore = 'https://play.google.com/store/apps/details?id=de.traderepublic.app';
  const appStore  = 'https://apps.apple.com/de/app/trade-republic/id1410703839';

  copyToClipboard(isin);
  showToast('ISIN ' + isin + ' kopiert – in TR-Suche einfügen');

  setTimeout(() => {
    if (isAndroid) {
      const fallback = encodeURIComponent(playStore);
      window.location.href =
        `intent://#Intent;scheme=traderepublic;package=de.traderepublic.app;S.browser_fallback_url=${fallback};end`;
    } else if (isIOS) {
      window.location.href = `traderepublic://`;
      setTimeout(() => { window.location.href = appStore; }, 800);
    } else {
      window.open('https://app.traderepublic.com/', '_blank');
    }
  }, 600);
}

function copyToClipboard(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.setAttribute('readonly', '');
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(el);
  el.focus(); el.select();
  el.setSelectionRange(0, el.value.length);
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(el);
  if (!ok && navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(()=>{});
  }
  return ok;
}

function showToast(msg) {
  let t = document.getElementById('tr-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'tr-toast';
    t.style.cssText = `
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      background:#1e293b; border:1px solid #334155; color:#e2e8f0;
      font-size:12px; padding:10px 16px; border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,0.5); z-index:999;
      text-align:center; max-width:280px; line-height:1.4;
      transition: opacity 0.3s;
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

  const pct = (g.pct*100);

  document.getElementById('mEmoji').textContent = g.emoji;
  document.getElementById('mName').style.color = g.color;
  document.getElementById('mName').textContent = g.name;
  document.getElementById('mSub').innerHTML = `<b>${gt} €</b> / Mo · <b>${Math.round(gt*12)} €</b> / Jahr`;

  document.getElementById('modalHeader').style.borderBottomColor = g.color+'22';
  document.getElementById('mShareBar').style.background = g.color+'12';
  document.getElementById('mSharePct').style.color = g.color;
  document.getElementById('mSharePct').textContent = pct.toFixed(1)+'%';
  document.getElementById('mShareFill').style.width = pct+'%';
  document.getElementById('mShareFill').style.background = g.color;
  document.getElementById('mShareNote').textContent = `von ${currentTotal} €/Monat gesamt`;

  const prod = document.getElementById('mProducts');
  prod.innerHTML = '';
  g.products.forEach(p=>{
    const pAmt = getAmt(p.pct);
    const div = document.createElement('div');
    div.className='product-card';
    div.style.borderColor = g.color+'20';

    let detailsHTML = '';
    if(p.details && p.details.length){
      const rows = p.details.map(d=>{
        if(d.p===null){
          return `<div class="detail-row">
            <div class="detail-top">
              <span class="detail-name overlap">${d.n}</span>
            </div>
          </div>`;
        }
        const mo = ((d.p/100)*pAmt).toFixed(2);
        const yr = ((d.p/100)*pAmt*12).toFixed(0);
        const barW = Math.min(d.p,100);
        return `<div class="detail-row">
          <div class="detail-top">
            <span class="detail-name">${d.n}</span>
            <span class="detail-pct" style="color:${g.color}">${d.p}%</span>
          </div>
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${barW}%;background:${g.color}"></div>
          </div>
          <div class="detail-euros">
            <span>≈ <b>${mo} €</b>/Mo</span>
            <span>≈ <b>${yr} €</b>/Jahr</span>
          </div>
        </div>`;
      }).join('');
      detailsHTML = `<div class="details">
        <div class="details-label">Positionen / Gewichtung</div>
        ${rows}
      </div>`;
    }

    div.innerHTML = `
      <div class="product-header" style="border-bottom-color:${g.color}15">
        <div class="product-title-row">
          <div class="product-name">${p.name}</div>
          <div class="ticker-badge" style="border-color:${g.color}44;color:var(--muted)">${p.ticker}</div>
        </div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-label">Monatlich</div>
            <div class="stat-val" style="color:${g.color}">${fmtAmt(p.pct)} €</div>
          </div>
          <div class="stat">
            <div class="stat-label">Jährlich</div>
            <div class="stat-val" style="color:#d1d5db">${Math.round(pAmt*12)} €</div>
          </div>
          <div class="stat">
            <div class="stat-label">Kurs (09.05)</div>
            <div class="stat-val" style="color:#facc15">${p.price}</div>
          </div>
        </div>
      </div>
      ${detailsHTML}
      ${p.warning ? `<div style="padding:4px 14px 6px;font-size:11px;color:#a78bfa;font-style:italic">${p.warning}</div>` : ''}
      <div style="display:flex;gap:8px;padding:8px 14px 12px;flex-wrap:wrap">
        <button class="tr-link" style="margin:0;flex:1;min-width:0" onclick="openTR('${p.isin}')">
          <span>🟢</span> Trade Republic
          <span style="font-size:10px;opacity:0.5;overflow:hidden;text-overflow:ellipsis">${p.isin}</span>
        </button>
      </div>`;
    prod.appendChild(div);
  });

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  window._openModalIndex = undefined;
}

// ── PWA INSTALL PROMPT ──────────────────────────────────────
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
const iosHint = document.getElementById('iosHint');

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

// iOS Safari hat kein beforeinstallprompt → eigener Hinweis
if (!isStandalone && isIOS) {
  iosHint.style.display = 'block';
}

// Android/Desktop Chrome/Edge: beforeinstallprompt feuert wenn installierbar
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!isStandalone) installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log(`User response to the install prompt: ${outcome}`);
    deferredPrompt = null;
    installBtn.style.display = 'none';
  }
});

window.addEventListener('appinstalled', () => {
  console.log('PWA wurde installiert');
  installBtn.style.display = 'none';
  iosHint.style.display = 'none';
});

// ── SERVICE WORKER REGISTRIERUNG ─────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(reg => {
      reg.update();
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (newSW) {
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        }
      });
    }).catch(err => {
      console.warn('Service Worker Fehler:', err);
    });
  });
}

const _arrowBtn = document.getElementById('slide-arrow');
const _slider   = document.getElementById('app-slider');
let _onGeo = false;
let _geoInitialized = false;
let _geoData = null;
let _geoRegions = null;
function _toggleSlide() {
  _onGeo = !_onGeo;
  _slider.classList.toggle('show-geo', _onGeo);
  _arrowBtn.innerHTML = _onGeo ? '&lsaquo;' : '&rsaquo;';
  if (_onGeo && !_geoInitialized) { _geoInitialized = true; initGeo(); }
  if (_onGeo) { setTimeout(updateGeoEUR, 50); }
}
_arrowBtn.addEventListener('click', _toggleSlide);

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

const REGION_META = {
  'Nordamerika':    { color:'#3B82F6', emoji:'🇺🇸' },
  'Europa':         { color:'#EC4899', emoji:'🇪🇺' },
  'Asien-Pazifik':  { color:'#F59E0B', emoji:'🌏' },
  'Emerging Mkts':  { color:'#10B981', emoji:'🌍' },
  'Edelmetalle-Länder': { color:'#F97316', emoji:'🥇' },
  'Sonstige':       { color:'#8B5CF6', emoji:'🏥' }
};

function regionOf(landName, regionsData) {
  for (const r of regionsData) {
    if (r['länder'] && r['länder'].includes(landName)) return r.region;
  }
  return null;
}

async function initGeo() {
  try {
    const resp = await fetch('./data/geo_weights.json?t=' + Date.now());
    _geoData = await resp.json();
    _geoRegions = _geoData.regions || [];
    renderLegendAndTable();
    await loadScript('https://d3js.org/d3.v7.min.js');
    await loadScript('https://unpkg.com/topojson-client@3');
    renderGeoMap();
    updateGeoEUR();
  } catch (e) {
    console.warn('Geo init failed:', e);
    document.getElementById('geoTableBody').innerHTML =
      '<div class="geo-loading">Daten konnten nicht geladen werden.</div>';
  }
}

function renderLegendAndTable() {
  const legendEl = document.getElementById('geoLegend');
  const tbody    = document.getElementById('geoTableBody');
  legendEl.innerHTML = '';
  tbody.innerHTML = '';
  const rowMap = {};
  const regions = [..._geoRegions].sort((a,b) => b.pct_gesamt - a.pct_gesamt);
  regions.forEach(r => {
    const meta = REGION_META[r.region] || { color:'#a78bfa', emoji:'🌐' };
    const pct  = r.pct_gesamt;
    const pill = document.createElement('div');
    pill.className = 'geo-pill';
    pill.dataset.rid = r.region;
    pill.innerHTML =
      '<div class="geo-pill-dot" style="background:'+meta.color+'"></div>'+
      meta.emoji+' '+r.region+' <span style="color:'+meta.color+';margin-left:2px">'+pct.toFixed(1)+'%</span>';
    pill.addEventListener('click', () => selectGeoRegion(r.region));
    legendEl.appendChild(pill);
    const row = document.createElement('div');
    row.className = 'geo-row';
    row.dataset.rid = r.region;
    row.innerHTML =
      '<div class="geo-row-name"><div class="geo-dot" style="background:'+meta.color+'"></div>'+meta.emoji+' '+r.region+'</div>'+
      '<div class="geo-row-eur" data-eur-pct="'+pct+'">—</div>'+
      '<div class="geo-row-pct" style="color:'+meta.color+'">'+pct.toFixed(1)+'%</div>';
    row.addEventListener('click', () => selectGeoRegion(r.region));
    rowMap[r.region] = row;
    tbody.appendChild(row);
  });
  window._geoRowMap = rowMap;
}

function updateGeoEUR() {
  if (!_geoRegions) return;
  document.querySelectorAll('.geo-row-eur').forEach(el => {
    const pct = parseFloat(el.dataset.eurPct);
    const eur = Math.round(currentTotal * pct / 100);
    el.textContent = eur + ' €';
  });
  document.getElementById('geoTotalBadge').textContent = currentTotal + ' € / Monat';
}

let _geoSvg = null, _geoActive = null;
function renderGeoMap() {
  const W = 960, H = 460, CROP_LEFT = 70;
  const svg = d3.select('#geoSvg').attr('viewBox', CROP_LEFT+' 0 '+(W-CROP_LEFT)+' '+H);
  _geoSvg = svg;
  svg.append('defs').append('clipPath').attr('id','mapClip')
    .append('rect').attr('width', W).attr('height', H);
  svg.append('rect').attr('x', CROP_LEFT).attr('width', W).attr('height', H)
    .attr('class', 'geo-ocean')
    .on('click', () => deselectGeo());
  const projection = d3.geoNaturalEarth1().scale(195).translate([W/2, H/1.68]);
  const pathGen    = d3.geoPath().projection(projection);
  svg.append('path').datum(d3.geoGraticule()()).attr('class','geo-graticule').attr('d', pathGen);

  const isoToRegion = {};
  (_geoData.countries || []).forEach(c => {
    const r = regionOf(c.land, _geoRegions);
    if (r) isoToRegion[c.iso_numeric] = r;
  });

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
    const countries = topojson.feature(world, world.objects.countries).features;
    const tip   = document.getElementById('geoTip');
    const wrap  = document.querySelector('.geo-map-wrap');
    svg.append('g').attr('clip-path','url(#mapClip)').selectAll('path')
      .data(countries).enter().append('path')
      .attr('class','geo-country')
      .attr('d', pathGen)
      .attr('fill', d => {
        const rid = isoToRegion[+d.id];
        return rid ? (REGION_META[rid] || {}).color || '#2a2a4a' : '#2a2a4a';
      })
      .attr('fill-opacity', d => {
        const rid = isoToRegion[+d.id];
        if (!rid) return 0.15;
        const r = _geoRegions.find(x => x.region === rid);
        return r ? Math.min(0.85, 0.15 + (r.pct_gesamt / 35) * 0.65) : 0.15;
      })
      .on('click', function(event, d) {
        event.stopPropagation();
        const rid = isoToRegion[+d.id];
        if (!rid) { deselectGeo(); return; }
        const [x, y] = pathGen.centroid(d);
        const rect = wrap.getBoundingClientRect();
        const px = (x / W) * rect.width;
        const py = (y / H) * rect.height;
        const TW = 160, TH = 50, PAD = 10;
        let left = (rect.width - px >= TW + PAD) ? px + PAD
                 : (px >= TW + PAD ? px - TW - PAD
                 : Math.max(4, Math.min(px - TW/2, rect.width - TW - 4)));
        let top  = (py >= TH + PAD) ? py - TH - PAD
                 : (rect.height - py >= TH + PAD ? py + PAD
                 : Math.max(4, Math.min(py - TH/2, rect.height - TH - 4)));
        tip.style.left = left + 'px';
        tip.style.top  = top  + 'px';
        selectGeoRegion(rid);
      });
    svg.append('path')
      .datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b))
      .attr('fill','none').attr('stroke','rgba(255,255,255,0.08)')
      .attr('stroke-width', 0.4).attr('d', pathGen);
  }).catch(() => {
    document.querySelector('.geo-map-wrap').innerHTML =
      '<p style="color:#6b7280;text-align:center;padding:24px;font-size:13px;">Karte konnte nicht geladen werden.</p>';
  });
}

function selectGeoRegion(rid) {
  if (_geoActive === rid) { deselectGeo(); return; }
  deselectGeo(false);
  _geoActive = rid;
  const r = _geoRegions.find(x => x.region === rid);
  if (!r) return;
  const meta = REGION_META[rid] || { color:'#a78bfa', emoji:'🌐' };
  if (_geoSvg) {
    _geoSvg.selectAll('.geo-country').classed('hl', false);
    const isoSet = new Set();
    (_geoData.countries || []).forEach(c => {
      if (regionOf(c.land, _geoRegions) === rid) isoSet.add(c.iso_numeric);
    });
    _geoSvg.selectAll('.geo-country').filter(d => isoSet.has(+d.id)).classed('hl', true);
  }
  const eur = Math.round(currentTotal * r.pct_gesamt / 100);
  document.getElementById('geoTipName').textContent = meta.emoji + ' ' + r.region;
  document.getElementById('geoTipName').style.color = meta.color;
  document.getElementById('geoTipEur').textContent = eur + ' €';
  document.getElementById('geoTipPct').textContent = r.pct_gesamt.toFixed(1) + ' %';
  document.getElementById('geoTip').classList.add('vis');
  if (window._geoRowMap && window._geoRowMap[rid]) {
    document.querySelectorAll('.geo-row').forEach(x => x.classList.remove('hl'));
    window._geoRowMap[rid].classList.add('hl');
    window._geoRowMap[rid].scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
  document.querySelectorAll('.geo-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.rid === rid));
}
function deselectGeo(clearAll) {
  if (clearAll === undefined) clearAll = true;
  _geoActive = null;
  if (_geoSvg) _geoSvg.selectAll('.geo-country').classed('hl', false);
  document.getElementById('geoTip').classList.remove('vis');
  if (clearAll) {
    document.querySelectorAll('.geo-row').forEach(x => x.classList.remove('hl'));
    document.querySelectorAll('.geo-pill').forEach(p => p.classList.remove('active'));
  }
}

(function hookSaveTotal() {
  if (typeof saveTotal !== 'function') return;
  const _origSave = saveTotal;
  window.saveTotal = function(v){
    _origSave(v);
    try { updateGeoEUR(); } catch(e){}
  };
})();

</script>
