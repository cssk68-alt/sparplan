<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0c29;
    --bg2: #1a1a3e;
    --text: #f3f4f6;
    --muted: #9ca3af;
    --dim: #6b7280;
    --dimmer: #374151;
  }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
    min-height: 100vh;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    padding: 24px 16px 40px;
  }

  .container { max-width: 480px; margin: 0 auto; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 20px; }
  .header-label {
    font-size: 11px; letter-spacing: 3px; color: #a78bfa;
    text-transform: uppercase; margin-bottom: 6px; display: block;
  }
  .header-total {
    font-size: 36px; font-weight: 900; display: block;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.15;
  }
  .header-sub { font-size: 12px; color: var(--dim); margin-top: 6px; display: block; }
  .header-hint { font-size: 11px; color: var(--dimmer); margin-top: 6px; display: block; }

  /* PIE */
  .pie-wrap {
    position: relative; height: 260px; margin-bottom: 16px;
  }
  .pie-wrap svg { display: block; margin: 0 auto; }
  .pie-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 144px;
    text-align: center;
    pointer-events: all; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
  }
  .pie-center-edit {
    font-size: 20px; font-weight: 900; color: #fff;
    background: none; border: none; border-bottom: 1px dashed #6b7280;
    text-align: center; width: 90px; outline: none;
    font-family: inherit;
  }
  .pie-center-emoji { font-size: 22px; line-height: 1; }
  .pie-center-name { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .pie-center-val { font-size: 12px; color: #d1d5db; }
  .pie-center-pct { font-size: 11px; color: var(--muted); }

  /* PILLS */
  .pills { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 22px; }
  .pill {
    display: flex; align-items: center; gap: 5px;
    border-radius: 20px; padding: 4px 11px;
    font-size: 12px; cursor: pointer; border: 1px solid;
    color: #e5e7eb; background: none;
    -webkit-tap-highlight-color: transparent;
  }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .pill-pct { font-weight: 700; }

  /* CARDS */
  .cards { display: flex; flex-direction: column; gap: 9px; }
  .card {
    border-radius: 14px; overflow: hidden; cursor: pointer;
    border: 1px solid; background: rgba(255,255,255,0.04);
    -webkit-tap-highlight-color: transparent;
  }
  .card-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
  .card-left { display: flex; align-items: center; gap: 8px; }
  .card-emoji { font-size: 16px; }
  .card-name { font-weight: 700; font-size: 13px; }
  .card-count { font-size: 10px; color: #4b5563; }
  .card-right { font-weight: 700; font-size: 14px; }
  .card-right span { margin-left: 6px; font-size: 11px; color: var(--muted); font-weight: 400; }
  .card-tickers { padding: 5px 16px 9px; display: flex; flex-wrap: wrap; gap: 2px 12px; }
  .card-bar-wrap { height: 2px; background: rgba(255,255,255,0.05); }
  .card-bar { height: 100%; }
  .card-ticker-item { font-size: 10px; color: var(--dim); }

  .footer { text-align: center; margin-top: 20px; font-size: 10px; color: var(--dimmer); }

  /* MODAL OVERLAY */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: linear-gradient(180deg, #1c1c40 0%, #13132d 100%);
    border-radius: 22px 22px 0 0;
    width: 100%; max-width: 520px;
    max-height: 82vh; overflow-y: auto;
    padding-bottom: 36px;
    animation: slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-handle-wrap { display: flex; justify-content: center; padding: 12px 0 0; }
  .modal-handle { width: 38px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }

  .modal-header { padding: 14px 20px 16px; border-bottom: 1px solid; }
  .modal-header-top { display: flex; align-items: center; justify-content: space-between; }
  .modal-header-left { display: flex; align-items: center; gap: 10px; }
  .modal-big-emoji { font-size: 30px; }
  .modal-group-name { font-weight: 900; font-size: 20px; }
  .modal-group-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-group-sub b { color: var(--text); }
  .modal-close {
    background: rgba(255,255,255,0.07); border: none; border-radius: 50%;
    width: 32px; height: 32px; color: var(--muted); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .modal-share-bar { margin-top: 14px; border-radius: 10px; padding: 10px 14px; }
  .modal-share-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; }
  .modal-share-row span:first-child { color: var(--dim); }
  .bar-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .modal-share-note { font-size: 11px; color: var(--dim); margin-top: 5px; }

  /* PRODUCTS */
  .products { padding: 14px 20px 0; }
  .product-card {
    margin-bottom: 14px; background: rgba(255,255,255,0.035);
    border-radius: 14px; overflow: hidden; border: 1px solid;
  }
  .product-header { padding: 12px 14px; border-bottom: 1px solid; }
  .product-title-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .product-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.35; flex: 1; margin-right: 8px; }
  .ticker-badge {
    font-size: 10px; color: var(--muted); padding: 2px 8px;
    border-radius: 6px; border: 1px solid; background: rgba(0,0,0,0.2);
    white-space: nowrap; flex-shrink: 0;
  }
  .stats-row { display: flex; }
  .stat { flex: 1; text-align: center; }
  .stat + .stat { border-left: 1px solid rgba(255,255,255,0.05); }
  .stat-label { font-size: 10px; color: var(--dim); margin-bottom: 2px; }
  .stat-val { font-size: 14px; font-weight: 700; }

  /* DETAIL ROWS */
  .details { padding: 8px 14px 12px; }
  .details-label {
    font-size: 10px; color: #4b5563; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .detail-row { padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .detail-row:last-child { border-bottom: none; }
  .detail-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .detail-name { font-size: 13px; color: var(--text); }
  .detail-name.overlap { color: #a78bfa; font-style: italic; }
  .detail-pct { font-size: 12px; font-weight: 700; }
  .mini-bar-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 4px; }
  .mini-bar-fill { height: 100%; border-radius: 2px; opacity: 0.65; }
  .tr-link {
    display: inline-flex; align-items: center; gap: 5px;
    margin: 10px 14px 12px;
    font-size: 11px; color: #6b7280;
    border: 1px solid #ffffff0f; border-radius: 8px;
    padding: 5px 10px; background: rgba(255,255,255,0.03);
    cursor: pointer; text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tr-link:active { background: rgba(255,255,255,0.08); }
  .tr-logo { font-size: 13px; }
</style>
</head>

<script>

// ŌöĆŌöĆ localStorage ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const STORAGE_KEY = 'sparplan_currentTotal';
const DEFAULT_TOTAL = GROUPS.reduce((s,g)=>s+g.products.reduce((a,p)=>a+p.amount,0),0); // 500

const total = DEFAULT_TOTAL;
const posCount = GROUPS.reduce((s,g)=>s+g.products.length,0);

// Prozentanteile festschreiben (unver├żnderlich)
GROUPS.forEach(g => {
  g.products.forEach(p => { p.pct = p.amount / total; });
  g.pct = g.products.reduce((a,p)=>a+p.pct,0);
});

// Gespeicherten Wert laden (pro Ger├żt individuell)
let currentTotal = parseFloat(localStorage.getItem(STORAGE_KEY)) || DEFAULT_TOTAL;

function saveTotal(val) {
  localStorage.setItem(STORAGE_KEY, val);
}

function getAmt(pct){ return Math.round(pct * currentTotal * 100) / 100; }
function fmtAmt(pct){ const v=getAmt(pct); return Number.isInteger(v)?v:v.toFixed(2); }

function updateHeader(){
  const hdrEl = document.getElementById('hdrTotal');
  hdrEl.textContent = currentTotal + ' Ōé¼';
  hdrEl.onclick = editTotal;
  hdrEl.style.cursor = 'pointer';
  document.getElementById('hdrSub').textContent = (currentTotal*12) + ' Ōé¼ / Jahr ┬Ę ' + posCount + ' Positionen';
}
updateHeader();

// ŌöĆŌöĆ PIE CHART (SVG) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const svg = document.getElementById('piesvg');
const cx=130, cy=130, r=110, ri=72, gap=0.03;
const pieData = GROUPS.map(g=>({
  name:g.name, color:g.color, emoji:g.emoji,
  value:g.products.reduce((a,p)=>a+p.amount,0),
  pct: g.pct
}));

function polarToXY(cx,cy,r,angle){
  return [cx+r*Math.cos(angle), cy+r*Math.sin(angle)];
}
function describeArc(cx,cy,r,ri,startA,endA){
  const [x1,y1]=polarToXY(cx,cy,r,startA);
  const [x2,y2]=polarToXY(cx,cy,r,endA);
  const [x3,y3]=polarToXY(cx,cy,ri,endA);
  const [x4,y4]=polarToXY(cx,cy,ri,startA);
  const large=endA-startA>Math.PI?1:0;
  return `M${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} L${x3},${y3} A${ri},${ri},0,${large},0,${x4},${y4} Z`;
}

let startAngle = -Math.PI/2;
const paths = [];
pieData.forEach((d,i)=>{
  const slice = (d.value/total)*2*Math.PI - gap;
  const endAngle = startAngle + slice;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', describeArc(cx,cy,r,ri,startAngle,endAngle));
  path.setAttribute('fill', d.color);
  path.setAttribute('stroke','none');
  path.style.cursor='pointer';
  path.style.transition='opacity 0.15s';
  path.dataset.index=i;

  path.addEventListener('click',()=>openModal(i));
  path.addEventListener('mouseenter',()=>{ highlightSlice(i); showPieCenter(i); });
  path.addEventListener('mouseleave',()=>{ resetSlices(); resetPieCenter(); });
  path.addEventListener('touchstart',(e)=>{ e.preventDefault(); highlightSlice(i); showPieCenter(i); },{passive:false});
  path.addEventListener('touchend',(e)=>{ e.preventDefault(); resetSlices(); resetPieCenter(); openModal(i); },{passive:false});

  svg.appendChild(path);
  paths.push(path);
  startAngle = endAngle + gap;
});

function highlightSlice(activeI){
  paths.forEach((p,i)=>{ p.style.opacity = (i===activeI)?'1':'0.3'; });
}
function resetSlices(){ paths.forEach(p=>{ p.style.opacity='1'; }); }

const pieCenter = document.getElementById('pieCenter');
function showPieCenter(i){
  const d = pieData[i];
  const val = getAmt(d.pct);
  pieCenter.onclick = null;
  pieCenter.innerHTML = `
    <div class="pie-center-emoji">${d.emoji}</div>
    <div class="pie-center-name" style="color:${d.color};white-space:nowrap">${d.name}</div>
    <div class="pie-center-val" style="white-space:nowrap">${val} Ōé¼/Mo</div>
    <div class="pie-center-pct" style="white-space:nowrap">${(d.pct*100).toFixed(1)}%</div>`;
}
function resetPieCenter(){
  pieCenter.onclick = editTotal;
  pieCenter.innerHTML = `
    <div style="font-size:11px;color:var(--muted);white-space:nowrap">Gesamt</div>
    <div style="font-size:22px;font-weight:900;white-space:nowrap">${currentTotal} Ōé¼</div>
    <div style="font-size:10px;color:var(--dim);white-space:nowrax">/ Monat</div>
    <div style="font-size:9px;color:#4b5563;white-space:nowrax;margin-top:2px">antippen zum ├ändern</div>`;
}

function editTotal(){
  pieCenter.onclick = null;
  pieCenter.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Betrag eingeben</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:3px">
      <input id="totalInput" class="pie-center-edit" type="number" value="${currentTotal}" min="1" inputmode="numeric"/>
      <span style="font-size:16px;font-weight:700">Ōé¼</span>
    </div>
    <div style="font-size:10px;color:var(--dim);margin-top:4px">Enter oder au├¤en tippen</div>`;
  const inp = document.getElementById('totalInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); applyTotal(inp); }});
  inp.addEventListener('blur', ()=>{ setTimeout(()=>applyTotal(inp),100); });
}

function applyTotal(inp){
  const val = parseFloat(inp.value);
  if(!isNaN(val) && val > 0){
    currentTotal = Math.round(val*100)/100;
    saveTotal(currentTotal); // ŌåÉ im localStorage sichern
  }
  updateAll();
}

function updateAll(){
  updateHeader();
  resetPieCenter();
  renderCards();

// ŌöĆŌöĆ TRADE REPUBLIC DEEPLINK ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function openTR(isin) {
  const ua = navigator.userAgent;
  const isAndroid = /Android/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const playStore = 'https://play.google.com/store/apps/details?id=de.traderepublic.app';
  const appStore  = 'https://apps.apple.com/de/app/trade-republic/id1410703839';

  copyToClipboard(isin);
  showToast('ISIN ' + isin + ' kopiert ŌĆō in TR-Suche einf├╝gen');

  setTimeout(() => {
    if (isAndroid) {
      const fallback = encodeURIComponent(playStore);
      window.location.href =
        `intent://#Intent;scheme=traderepublic;package=de.traderepublic.app;S.browser_fallback_url=${fallback};end`;
    } else if (isIOS) {
      window.location.href = `traderepublic://`;
      setTimeout(() => { window.location.href = appStore; }, 800);
    } else {
      window.open('https://app.traderepublic.com/', '_blank');
    }
  }, 600);
}

function copyToClipboard(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.setAttribute('readonly', '');
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(el);
  el.focus(); el.select();
  el.setSelectionRange(0, el.value.length);
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(el);
  if (!ok && navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(()=>{});
  }
  return ok;
}

function showToast(msg) {
  let t = document.getElementById('tr-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'tr-toast';
    t.style.cssText = `
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      background:#1e293b; border:1px solid #334155; color:#e2e8f0;
      font-size:12px; padding:10px 16px; border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,0.5); z-index:999;
      text-align:center; max-width:280px; line-height:1.4;
      transition: opacity 0.3s;
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

// ŌöĆŌöĆ MODAL ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function openModal(groupIndex){
  window._openModalIndex = groupIndex;
  const g = GROUPS[groupIndex];
  const gt = getAmt(g.pct);
  const pct = (g.pct*100);

  document.getElementById('mEmoji').textContent = g.emoji;
  document.getElementById('mName').style.color = g.color;
  document.getElementById('mName').textContent = g.name;
  document.getElementById('mSub').innerHTML = `<b>${gt} Ōé¼</b> / Mo ┬Ę <b>${Math.round(gt*12)} Ōé¼</b> / Jahr`;
  document.getElementById('modalHeader').style.borderBottomColor = g.color('22';
  document.getElementById('mShareBar').style.background = g.color('12';
  document.getElementById('mSharePct').style.color = g.color;
  document.getElementById('mSharePct').textContent = pct.toFixed(1)+'%';
  document.getElementById('mShareFill').style.width = pct+'%';
  document.getElementById('mShareFill').style.background = g.color;
  document.getElementById('mShareNote').textContent = `von ${currentTotal} Ōé¼/Monat gesamt`;

  const prod = document.getElementById('mProducts');
  prod.innerHTML = '';
  g.products.forEach(p=>{
    const pAmt = getAmt(p.pct);
    const div = document.createElement('div');
    div.className='product-card';
    div.style.borderColor = g.color('20';
    let detailsHTML = '';
    if(p.details && p.details.length){
      const rows = p.details.map(d=>{
        if(d.p===null){
          return `<div class="detail-row">
            <div class="detail-top">
              <span class="detail-name overlap">${d.}</span>
            </div>
          </div>`;
        }
        const mo = ((d.p/100)*pAmt).toFixed(2);
        const yr = ((d.p/100)*pAmt*12).toFixed(0);
        const barW = Math.min(d.p,100);
        return `<div class="detail-row">
          <div class="detail-top">
            <span class="detail-name">${d.n}</span>
            <span class="detail-pct" style="color:${g.color}">${d.p}%</span>
          </div>
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${barW}%;background:${g.color}"></div>
          </div>
          <div class="detail-euros">
            <span>Ōēł <b>${mo} Ōé¼</b>/Mo</span>
            <span>Ōēł <b>${yr} Ōé¼</b>/Jahr</span>
          </div>
        </div>`;
      }).join('');
      detailsHTML = `<div class="details">
        <div class="details-label">Positionen / Gewichtung</div>
        ${rows}
      </div>`;
    }
    div.innerHTML = `
      <div class="product-header" style="border-bottom-color:${g.color}15">
        <div class="product-title-row">
          <div class="product-name">${p.name}</div>
          <div class="ticker-badge" style="border-color:${g.color}44;color:var(--muted)">${p.ticker}</div>
        </div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-label">Monatlich</div>
            <div class="stat-val" style="color:${g.color}">${fmtAmt(p.pct)} Ōé¼</div>
          </div>
          <div class="stat">
            <div class="stat-label">J├żhrlich</div>
            <div class="stat-val" style="color:#d1d5db">${Math.round(pAmt*12)} Ōé¼</div>
          </div>
          <div class="stat">
            <div class="stat-label">Kurs (09.05)</div>
            <div class="stat-val" style="color:#facc15">${p.price}</div>
          </div>
        </div>
      </div>
      ${detailsHTML}
      ${p.warning ? `<div style="padding:4px 14px 6px;font-size:11px;color:#a78bfa;font-style:italic">${p.warning}</div>` : ''}
      <div style="display:flex;gap:8px;padding:8px 14px 12px;flex-wrap:wrap">
        <button class="tr-link" style="margin:0;flex:1;min-width:0" onclick="openTR('${p.isin}')">
          <span>­¤¤ó</span> Trade Republic
          <span style="font-size:10px;opacity:0.5;overflow:hidden;text-overflow:ellipsis">${p.isin}</span>
        </button>
      </div>`;
    prod.appendChild(div);
  });

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  window._openModalIndex = undefined;
}
